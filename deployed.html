<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎵 AI Mood Music Recommender</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 2em;
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        label {
            display: block;
            font-weight: 600;
            color: #555;
            margin-bottom: 8px;
            font-size: 1.1em;
        }
        
        select, input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }
        
        select:focus, input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .loading {
            text-align: center;
            color: #667eea;
            font-weight: 600;
            margin-top: 20px;
        }
        
        .results {
            margin-top: 30px;
        }
        
        .song-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 12px;
            border-left: 4px solid #667eea;
        }
        
        .song-title {
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }
        
        .song-links {
            display: flex;
            gap: 10px;
        }
        
        .song-links a {
            display: inline-block;
            padding: 8px 12px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-size: 0.9em;
            transition: background 0.3s;
        }
        
        .song-links a:hover {
            background: #764ba2;
        }
        
        .error {
            color: #d32f2f;
            background: #ffebee;
            padding: 12px;
            border-radius: 8px;
            margin-top: 15px;
        }
        
        .success-message {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎵 AI Mood Music Recommender</h1>
        
        <form id="moodForm">
            <div class="form-group">
                <label for="language">Select your preferred language</label>
                <select id="language" required>
                    <option value="">-- Choose a language --</option>
                    <option value="English">English</option>
                    <option value="Bengali">Bengali</option>
                    <option value="Hindi">Hindi</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="mood">How are you feeling?</label>
                <input type="text" id="mood" placeholder="e.g., Happy, Sad, Energetic, Calm, Romantic" required>
            </div>
            
            <button type="submit">Get 5 Songs</button>
        </form>
        
        <div id="loading" class="loading" style="display: none;">Loading songs...</div>
        <div id="results" class="results"></div>
    </div>

    <script>
        const API_KEY = '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';
        const API_URL = 'https://api.groq.com/v1/completions';

        // Debug: Check if API key was replaced
        console.log('API Key starts with:', API_KEY.substring(0, 10) + '...');
        console.log('API Key length:', API_KEY.length);
        
        // Alert if key wasn't replaced
        if (API_KEY === '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') {
            alert('API key was not replaced! Check GitHub Actions workflow.');
        }

        document.getElementById('moodForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const language = document.getElementById('language').value;
            const mood = document.getElementById('mood').value;
            const resultsDiv = document.getElementById('results');
            const loadingDiv = document.getElementById('loading');

            if (!language || !mood) {
                resultsDiv.innerHTML = '<div class="error">Please fill in all fields.</div>';
                return;
            }

            loadingDiv.style.display = 'block';
            resultsDiv.innerHTML = '';

            try {
                const prompt = `Suggest exactly 5 ${language} songs for someone who is feeling ${mood}. 
                For each song, provide:
                1. Song name
                2. Artist name
                3. Spotify link (if available, otherwise YouTube link)
                
                Format each song as: [Song Name] - [Artist Name] - [Link]
                Use actual, real songs that exist.`;

                const requestUrl = API_URL;
                console.log('Request URL:', requestUrl);
                console.log('API Key being used:', API_KEY.substring(0, 10) + '...');

                const response = await fetch(requestUrl, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${API_KEY}`,
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        model: 'llama3-8b',
                        prompt: prompt,
                        max_tokens: 500,
                        temperature: 0.7,
                        top_p: 0.95
                    })
                });

                console.log('Response status:', response.status);
                console.log('Response headers:', response.headers);

                if (!response.ok) {
                    const errBody = await response.text();
                    console.error('API error body:', errBody);
                    throw new Error(`API Error: ${response.status} - ${errBody}`);
                }

                const data = await response.json();
                console.log('GROQ response payload:', data);

                let content = '';
                if (data.choices && data.choices.length > 0) {
                    content = data.choices[0].text || data.choices[0].message?.content || '';
                } else if (data.output && data.output.length > 0) {
                    content = data.output[0].content[0]?.text || '';
                }

                if (!content) {
                    throw new Error('No response text returned by the API');
                }

                displaySongs(content);
            } catch (error) {
                resultsDiv.innerHTML = `<div class="error">Error: ${error.message}</div>`;
                console.error('Error:', error);
            } finally {
                loadingDiv.style.display = 'none';
            }
        });

        function displaySongs(content) {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<h2 style="color: #333; margin-bottom: 15px;">Recommended Songs:</h2>';
            
            const lines = content.split('\n').filter(line => line.trim());
            let songCount = 0;

            lines.forEach(line => {
                if (line.trim() && songCount < 5) {
                    const songItem = document.createElement('div');
                    songItem.className = 'song-item';
                    
                    // Parse song information
                    const songTitle = document.createElement('div');
                    songTitle.className = 'song-title';
                    songTitle.textContent = line;
                    songItem.appendChild(songTitle);
                    
                    resultsDiv.appendChild(songItem);
                    songCount++;
                }
            });

            if (songCount === 0) {
                resultsDiv.innerHTML += '<div class="error">Could not parse songs. Please try again.</div>';
            }
        }
    </script>
</body>
</html>
