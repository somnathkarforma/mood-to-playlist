<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Moodwave — AI Music Recommender</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink: #0d0d12; --ink-soft: #5a5a72; --surface: #ffffff;
      --surface-2: #f4f3f8; --accent: #6c47ff; --border: rgba(108,71,255,.15);
      --radius-sm: 8px; --radius-md: 14px; --radius-lg: 24px;
      --shadow-card: 0 4px 24px rgba(13,13,18,.08), 0 1px 4px rgba(13,13,18,.04);
      --shadow-btn: 0 8px 28px rgba(108,71,255,.35);
      --font-head: 'Playfair Display', Georgia, serif;
      --font-body: 'DM Sans', sans-serif;
      --transition: .22s cubic-bezier(.4,0,.2,1);
    }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font-body); background: var(--surface-2); color: var(--ink);
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; padding: 48px 20px 80px;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 0;
    }
    .wordmark { display: flex; flex-direction: column; align-items: center; gap: 6px; margin-bottom: 40px; position: relative; z-index: 1; }
    .wordmark-logo { display: flex; align-items: center; gap: 10px; }
    .wordmark-icon { width: 40px; height: 40px; background: var(--accent); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; box-shadow: 0 4px 16px rgba(108,71,255,.4); }
    .wordmark h1 { font-family: var(--font-head); font-size: clamp(2rem, 5vw, 2.8rem); font-weight: 700; letter-spacing: -0.5px; color: var(--ink); }
    .wordmark h1 span { color: var(--accent); }
    .wordmark-tagline { font-size: .85rem; color: var(--ink-soft); font-weight: 300; letter-spacing: .08em; text-transform: uppercase; }
    .card { background: var(--surface); border-radius: var(--radius-lg); box-shadow: var(--shadow-card); padding: clamp(28px, 5vw, 48px); width: 100%; max-width: 580px; position: relative; z-index: 1; border: 1px solid var(--border); }
    .field { margin-bottom: 22px; }
    .field label { display: block; font-size: .8rem; font-weight: 500; letter-spacing: .07em; text-transform: uppercase; color: var(--ink-soft); margin-bottom: 8px; }
    .field select, .field input[type="text"] { width: 100%; padding: 13px 16px; border: 1.5px solid #e2e0ea; border-radius: var(--radius-md); font-family: var(--font-body); font-size: 1rem; color: var(--ink); background: var(--surface); transition: border-color var(--transition), box-shadow var(--transition); appearance: none; }
    .select-wrapper { position: relative; }
    .select-wrapper::after { content: '▾'; position: absolute; right: 14px; top: 50%; transform: translateY(-50%); color: var(--ink-soft); pointer-events: none; font-size: .9rem; }
    .field select:focus, .field input[type="text"]:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(108,71,255,.12); }
    .mood-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
    .chip { padding: 5px 13px; border: 1.5px solid #e2e0ea; border-radius: 999px; font-size: .8rem; font-family: var(--font-body); color: var(--ink-soft); background: transparent; cursor: pointer; transition: all var(--transition); }
    .chip:hover, .chip.active { border-color: var(--accent); color: var(--accent); background: rgba(108,71,255,.07); }
    .btn-primary { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 15px 20px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius-md); font-family: var(--font-body); font-size: 1rem; font-weight: 500; cursor: pointer; transition: transform var(--transition), box-shadow var(--transition), background var(--transition); margin-top: 8px; }
    .btn-primary:hover:not(:disabled) { background: #5535e8; transform: translateY(-2px); box-shadow: var(--shadow-btn); }
    .btn-primary:active:not(:disabled) { transform: translateY(0); }
    .btn-primary:disabled { opacity: .6; cursor: not-allowed; }
    .spinner { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,.35); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; display: none; }
    .btn-primary.loading .btn-label { display: none; }
    .btn-primary.loading .spinner { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .divider { height: 1px; background: linear-gradient(to right, transparent, #e2e0ea, transparent); margin: 28px 0; }
    #results-section { display: none; }
    .results-header { display: flex; align-items: baseline; gap: 10px; margin-bottom: 16px; }
    .results-header h2 { font-family: var(--font-head); font-size: 1.25rem; font-weight: 700; }
    .results-header .badge { background: var(--surface-2); color: var(--ink-soft); font-size: .75rem; font-weight: 500; padding: 3px 9px; border-radius: 999px; letter-spacing: .04em; }
    .song-list { display: flex; flex-direction: column; gap: 12px; }
    .song-card { display: flex; align-items: flex-start; gap: 14px; padding: 16px; border: 1.5px solid #e2e0ea; border-radius: var(--radius-md); transition: border-color var(--transition), box-shadow var(--transition); animation: slideUp .35s ease both; }
    .song-card:hover { border-color: var(--accent); box-shadow: 0 2px 12px rgba(108,71,255,.1); }
    @keyframes slideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .song-num { min-width: 28px; height: 28px; background: var(--surface-2); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: .78rem; font-weight: 500; color: var(--ink-soft); flex-shrink: 0; margin-top: 1px; }
    .song-info { flex: 1; min-width: 0; }
    .song-name { font-weight: 500; font-size: .97rem; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .song-artist { font-size: .83rem; color: var(--ink-soft); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .song-reason { font-size: .78rem; color: var(--accent); margin-top: 5px; line-height: 1.4; font-style: italic; white-space: normal; }
    .song-actions { display: flex; gap: 7px; flex-shrink: 0; align-items: flex-start; }
    .btn-link { padding: 6px 11px; border-radius: var(--radius-sm); font-size: .78rem; font-weight: 500; font-family: var(--font-body); text-decoration: none; cursor: pointer; border: 1.5px solid transparent; transition: all var(--transition); white-space: nowrap; }
    .btn-spotify { background: #1DB954; color: #fff; border-color: #1DB954; }
    .btn-spotify:hover { background: #17a349; border-color: #17a349; }
    .btn-yt { background: transparent; color: var(--ink-soft); border-color: #e2e0ea; }
    .btn-yt:hover { border-color: var(--ink-soft); color: var(--ink); }
    .notice { display: flex; gap: 10px; align-items: flex-start; padding: 14px 16px; border-radius: var(--radius-md); font-size: .9rem; line-height: 1.5; }
    .notice-error { background: #fff1f2; color: #b91c1c; border: 1.5px solid #fecdd3; }
    .notice-icon { font-size: 1rem; flex-shrink: 0; margin-top: 1px; }
    .footer { margin-top: 32px; font-size: .78rem; color: var(--ink-soft); text-align: center; position: relative; z-index: 1; }
    @media (max-width: 480px) { .song-card { flex-wrap: wrap; } .song-actions { width: 100%; margin-top: 10px; } .card { padding: 24px 18px; } }
  </style>
</head>
<body>
  <header class="wordmark">
    <div class="wordmark-logo">
      <div class="wordmark-icon">🎵</div>
      <h1>Mood<span>wave</span></h1>
    </div>
    <p class="wordmark-tagline">AI-powered music for every feeling</p>
  </header>

  <main class="card" role="main">
    <form id="moodForm" novalidate>
      <div class="field">
        <label for="language">Language</label>
        <div class="select-wrapper">
          <select id="language" required aria-required="true">
            <option value="">Select a language…</option>
            <option value="English">English</option>
            <option value="Bengali">Bengali</option>
            <option value="Hindi">Hindi</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label for="mood">Your mood right now</label>
        <input type="text" id="mood" placeholder="e.g. Happy, Melancholic, Pumped up…"
          maxlength="80" autocomplete="off" spellcheck="false" required aria-required="true" />
        <div class="mood-chips" aria-label="Mood suggestions">
          <button type="button" class="chip" data-mood="Happy">Happy</button>
          <button type="button" class="chip" data-mood="Sad">Sad</button>
          <button type="button" class="chip" data-mood="Energetic">Energetic</button>
          <button type="button" class="chip" data-mood="Calm">Calm</button>
          <button type="button" class="chip" data-mood="Romantic">Romantic</button>
          <button type="button" class="chip" data-mood="Focused">Focused</button>
          <button type="button" class="chip" data-mood="Heartbroken">Heartbroken</button>
          <button type="button" class="chip" data-mood="Nostalgic">Nostalgic</button>
          <button type="button" class="chip" data-mood="Motivated">Motivated</button>
          <button type="button" class="chip" data-mood="Anxious">Anxious</button>
        </div>
      </div>
      <div id="form-error" role="alert" aria-live="polite"></div>
      <button type="submit" class="btn-primary" id="submitBtn" aria-label="Get 5 song recommendations">
        <span class="btn-label">✦ Get 5 Songs</span>
        <div class="spinner" aria-hidden="true"></div>
      </button>
    </form>

    <div id="results-section" aria-live="polite" aria-label="Song recommendations">
      <div class="divider"></div>
      <div class="results-header">
        <h2>Recommendations</h2>
        <span class="badge" id="results-meta"></span>
      </div>
      <div class="song-list" id="songList"></div>
    </div>
  </main>

  <footer class="footer">
    <p>Powered by Groq &amp; Llama 3.3 · Links open in a new tab</p>
  </footer>

  <script>
    const PROXY_URL    = '';
    const GROQ_API_KEY = 'GROQ_API_KEY_PLACEHOLDER';
    const GROQ_MODEL   = 'llama-3.3-70b-versatile';

    const form           = document.getElementById('moodForm');
    const submitBtn      = document.getElementById('submitBtn');
    const formError      = document.getElementById('form-error');
    const resultsSection = document.getElementById('results-section');
    const songList       = document.getElementById('songList');
    const resultsMeta    = document.getElementById('results-meta');

    document.querySelectorAll('.chip').forEach(chip => {
      chip.addEventListener('click', () => {
        document.getElementById('mood').value = chip.dataset.mood;
        document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        formError.innerHTML = '';
      });
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const language = document.getElementById('language').value.trim();
      const mood     = document.getElementById('mood').value.trim();
      if (!language || !mood) { showFormError('Please choose a language and describe your mood.'); return; }
      setLoading(true);
      formError.innerHTML = '';
      resultsSection.style.display = 'none';
      songList.innerHTML = '';
      try {
        const songs = await fetchSongs(language, mood);
        renderSongs(songs, language, mood);
      } catch (err) {
        showFormError(err.message || 'Something went wrong. Please try again.');
        console.error('[Moodwave]', err);
      } finally {
        setLoading(false);
      }
    });

    async function fetchSongs(language, mood) {
      const prompt = `You are an expert music therapist and DJ with deep knowledge of ${language} music across all eras. You understand the emotional and psychological connection between music and human feelings.

A listener is currently feeling: "${mood}"
Their preferred music language/culture: ${language}

Step 1 — Analyse the mood "${mood}" across these dimensions:
- Energy level: high / medium / low
- Emotional valence: positive / negative / mixed
- Tempo preference: fast / mid-tempo / slow
- Lyrical themes that would resonate (e.g. heartbreak, celebration, nostalgia, self-empowerment, longing, joy)

Step 2 — Use that analysis to select exactly 5 ${language} songs that are a STRONG emotional match. Follow these rules strictly:
1. Pick songs whose lyrics, melody, and overall feel authentically reflect the mood "${mood}" — not just a surface-level keyword match
2. Choose songs that are well-known, critically acclaimed, or have strong cultural significance in ${language} music
3. Vary the artists — do not pick more than 1 song from the same artist
4. Mix classic and contemporary tracks where possible
5. For sad/heartbroken moods: pick deeply emotional ballads, not just any slow song
6. For happy/energetic moods: pick upbeat feel-good anthems with joyful energy
7. For calm/focused moods: pick melodically soothing tracks with gentle tempo
8. For romantic moods: pick songs with themes of love, longing, or intimacy

Step 3 — Return ONLY a valid JSON array. No extra text, no explanation, no markdown, no code fences:
[
  {
    "title": "Song Title",
    "artist": "Artist Name",
    "reason": "One concise sentence explaining exactly why this song matches the mood",
    "spotify": "https://open.spotify.com/track/... (real URL only, or empty string)",
    "youtube": "https://www.youtube.com/results?search_query=Song+Title+Artist+Name"
  }
]

Critical: only real existing ${language} songs. Spotify only if certain. YouTube always as search URL. Return nothing except the JSON array.`;

      const endpoint = PROXY_URL ? PROXY_URL : 'https://api.groq.com/openai/v1/chat/completions';
      const headers  = { 'Content-Type': 'application/json' };
      if (!PROXY_URL && GROQ_API_KEY) { headers['Authorization'] = `Bearer ${GROQ_API_KEY}`; }

      const response = await fetch(endpoint, {
        method: 'POST', headers,
        body: JSON.stringify({
          model: GROQ_MODEL,
          messages: [
            { role: 'system', content: 'You are a music recommendation expert. Respond with valid JSON only — no markdown, no explanation, no extra text. Recommendations must be emotionally intelligent and culturally authentic.' },
            { role: 'user', content: prompt }
          ],
          max_tokens: 1200,
          temperature: 0.6
        })
      });

      if (!response.ok) {
        let detail = '';
        try { const j = await response.json(); detail = j?.error?.message || ''; } catch {}
        throw new Error(`API error ${response.status}${detail ? ': ' + detail : ''}.`);
      }

      const data    = await response.json();
      const raw     = (data?.choices?.[0]?.message?.content || '').trim();
      const jsonStr = raw.replace(/^```(?:json)?\s*/i, '').replace(/\s*```$/, '').trim();
      let songs;
      try {
        songs = JSON.parse(jsonStr);
        if (!Array.isArray(songs)) throw new Error('Not an array');
      } catch {
        console.error('[Moodwave] Raw response:', raw);
        throw new Error('Could not parse recommendations. Please try again.');
      }
      return songs.slice(0, 5);
    }

    function renderSongs(songs, language, mood) {
      resultsMeta.textContent = `${language} · ${mood}`;
      songs.forEach((song, i) => {
        const card    = document.createElement('div');
        card.className = 'song-card';
        card.style.animationDelay = `${i * 70}ms`;
        const title   = sanitize(song.title  || 'Unknown Title');
        const artist  = sanitize(song.artist || 'Unknown Artist');
        const reason  = sanitize(song.reason || '');
        const spotify = isValidUrl(song.spotify) ? song.spotify : '';
        const ytBase  = 'https://www.youtube.com/results?search_query=';
        const youtube = isValidUrl(song.youtube) ? song.youtube : ytBase + encodeURIComponent(`${song.title} ${song.artist}`);
        card.innerHTML = `
          <div class="song-num">${i + 1}</div>
          <div class="song-info">
            <div class="song-name" title="${title}">${title}</div>
            <div class="song-artist">${artist}</div>
            ${reason ? `<div class="song-reason">✦ ${reason}</div>` : ''}
          </div>
          <div class="song-actions">
            ${spotify ? `<a href="${spotify}" target="_blank" rel="noopener noreferrer" class="btn-link btn-spotify">Spotify</a>` : ''}
            <a href="${youtube}" target="_blank" rel="noopener noreferrer" class="btn-link btn-yt">YouTube</a>
          </div>`;
        songList.appendChild(card);
      });
      resultsSection.style.display = 'block';
      resultsSection.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function setLoading(on) { submitBtn.disabled = on; submitBtn.classList.toggle('loading', on); }
    function showFormError(msg) {
      formError.innerHTML = `<div class="notice notice-error" role="alert"><span class="notice-icon">⚠</span><span>${sanitize(msg)}</span></div>`;
    }
    function sanitize(str) { const d = document.createElement('div'); d.textContent = str; return d.innerHTML; }
    function isValidUrl(str) { try { return str && ['https:', 'http:'].includes(new URL(str).protocol); } catch { return false; } }
  </script>
</body>
</html>
