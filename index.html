<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Moodwave — AI Music Recommender</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset & Tokens ─────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:        #0d0d12;
      --ink-soft:   #5a5a72;
      --surface:    #ffffff;
      --surface-2:  #f4f3f8;
      --accent:     #6c47ff;
      --accent-2:   #ff5f7e;
      --gold:       #f5c842;
      --border:     rgba(108,71,255,.15);
      --radius-sm:  8px;
      --radius-md:  14px;
      --radius-lg:  24px;
      --shadow-card: 0 4px 24px rgba(13,13,18,.08), 0 1px 4px rgba(13,13,18,.04);
      --shadow-btn:  0 8px 28px rgba(108,71,255,.35);
      --font-head:  'Playfair Display', Georgia, serif;
      --font-body:  'DM Sans', sans-serif;
      --transition: .22s cubic-bezier(.4,0,.2,1);
    }

    /* ── Base ───────────────────────────────────────────── */
    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font-body);
      background: var(--surface-2);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 20px 80px;
    }

    /* Subtle noise overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    /* ── Wordmark / Header ──────────────────────────────── */
    .wordmark {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      margin-bottom: 40px;
      position: relative;
      z-index: 1;
    }

    .wordmark-logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .wordmark-icon {
      width: 40px;
      height: 40px;
      background: var(--accent);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      box-shadow: 0 4px 16px rgba(108,71,255,.4);
    }

    .wordmark h1 {
      font-family: var(--font-head);
      font-size: clamp(2rem, 5vw, 2.8rem);
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--ink);
    }

    .wordmark h1 span { color: var(--accent); }

    .wordmark-tagline {
      font-size: .85rem;
      color: var(--ink-soft);
      font-weight: 300;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    /* ── Card ───────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-card);
      padding: clamp(28px, 5vw, 48px);
      width: 100%;
      max-width: 560px;
      position: relative;
      z-index: 1;
      border: 1px solid var(--border);
    }

    /* ── Form ───────────────────────────────────────────── */
    .field { margin-bottom: 22px; }

    .field label {
      display: block;
      font-size: .8rem;
      font-weight: 500;
      letter-spacing: .07em;
      text-transform: uppercase;
      color: var(--ink-soft);
      margin-bottom: 8px;
    }

    .field select,
    .field input[type="text"] {
      width: 100%;
      padding: 13px 16px;
      border: 1.5px solid #e2e0ea;
      border-radius: var(--radius-md);
      font-family: var(--font-body);
      font-size: 1rem;
      color: var(--ink);
      background: var(--surface);
      transition: border-color var(--transition), box-shadow var(--transition);
      appearance: none;
    }

    .select-wrapper { position: relative; }
    .select-wrapper::after {
      content: '▾';
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--ink-soft);
      pointer-events: none;
      font-size: .9rem;
    }

    .field select:focus,
    .field input[type="text"]:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(108,71,255,.12);
    }

    /* Mood chips */
    .mood-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .chip {
      padding: 5px 13px;
      border: 1.5px solid #e2e0ea;
      border-radius: 999px;
      font-size: .8rem;
      font-family: var(--font-body);
      color: var(--ink-soft);
      background: transparent;
      cursor: pointer;
      transition: all var(--transition);
    }

    .chip:hover, .chip.active {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(108,71,255,.07);
    }

    /* ── Button ─────────────────────────────────────────── */
    .btn-primary {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 15px 20px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-md);
      font-family: var(--font-body);
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: transform var(--transition), box-shadow var(--transition), background var(--transition);
      margin-top: 8px;
    }

    .btn-primary:hover:not(:disabled) {
      background: #5535e8;
      transform: translateY(-2px);
      box-shadow: var(--shadow-btn);
    }

    .btn-primary:active:not(:disabled) { transform: translateY(0); }

    .btn-primary:disabled {
      opacity: .6;
      cursor: not-allowed;
    }

    /* ── Spinner ─────────────────────────────────────────── */
    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      display: none;
    }

    .btn-primary.loading .btn-label { display: none; }
    .btn-primary.loading .spinner   { display: block; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Divider ─────────────────────────────────────────── */
    .divider {
      height: 1px;
      background: linear-gradient(to right, transparent, #e2e0ea, transparent);
      margin: 28px 0;
    }

    /* ── Results ─────────────────────────────────────────── */
    #results-section { display: none; }

    .results-header {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 16px;
    }

    .results-header h2 {
      font-family: var(--font-head);
      font-size: 1.25rem;
      font-weight: 700;
    }

    .results-header .badge {
      background: var(--surface-2);
      color: var(--ink-soft);
      font-size: .75rem;
      font-weight: 500;
      padding: 3px 9px;
      border-radius: 999px;
      letter-spacing: .04em;
    }

    /* Song cards */
    .song-list { display: flex; flex-direction: column; gap: 12px; }

    .song-card {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding: 16px;
      border: 1.5px solid #e2e0ea;
      border-radius: var(--radius-md);
      transition: border-color var(--transition), box-shadow var(--transition);
      animation: slideUp .35s ease both;
    }

    .song-card:hover {
      border-color: var(--accent);
      box-shadow: 0 2px 12px rgba(108,71,255,.1);
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .song-num {
      min-width: 28px;
      height: 28px;
      background: var(--surface-2);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .78rem;
      font-weight: 500;
      color: var(--ink-soft);
      flex-shrink: 0;
      margin-top: 1px;
    }

    .song-info { flex: 1; min-width: 0; }

    .song-name {
      font-weight: 500;
      font-size: .97rem;
      color: var(--ink);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .song-artist {
      font-size: .83rem;
      color: var(--ink-soft);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .song-actions {
      display: flex;
      gap: 7px;
      flex-shrink: 0;
      align-items: flex-start;
    }

    .btn-link {
      padding: 6px 11px;
      border-radius: var(--radius-sm);
      font-size: .78rem;
      font-weight: 500;
      font-family: var(--font-body);
      text-decoration: none;
      cursor: pointer;
      border: 1.5px solid transparent;
      transition: all var(--transition);
      white-space: nowrap;
    }

    .btn-spotify {
      background: #1DB954;
      color: #fff;
      border-color: #1DB954;
    }
    .btn-spotify:hover { background: #17a349; border-color: #17a349; }

    .btn-yt {
      background: transparent;
      color: var(--ink-soft);
      border-color: #e2e0ea;
    }
    .btn-yt:hover { border-color: var(--ink-soft); color: var(--ink); }

    /* ── Error / Notice ─────────────────────────────────── */
    .notice {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      padding: 14px 16px;
      border-radius: var(--radius-md);
      font-size: .9rem;
      line-height: 1.5;
    }

    .notice-error {
      background: #fff1f2;
      color: #b91c1c;
      border: 1.5px solid #fecdd3;
    }

    .notice-icon { font-size: 1rem; flex-shrink: 0; margin-top: 1px; }

    /* ── Footer ─────────────────────────────────────────── */
    .footer {
      margin-top: 32px;
      font-size: .78rem;
      color: var(--ink-soft);
      text-align: center;
      position: relative;
      z-index: 1;
    }

    /* ── Responsive ─────────────────────────────────────── */
    @media (max-width: 420px) {
      .song-actions { flex-direction: column; }
      .card { padding: 24px 18px; }
    }
  </style>
</head>
<body>

  <!-- Wordmark -->
  <header class="wordmark">
    <div class="wordmark-logo">
      <div class="wordmark-icon">🎵</div>
      <h1>Mood<span>wave</span></h1>
    </div>
    <p class="wordmark-tagline">AI-powered music for every feeling</p>
  </header>

  <!-- Main card -->
  <main class="card" role="main">

    <!-- Form -->
    <form id="moodForm" novalidate>

      <div class="field">
        <label for="language">Language</label>
        <div class="select-wrapper">
          <select id="language" required aria-required="true">
            <option value="">Select a language…</option>
            <option value="English">English</option>
            <option value="Bengali">Bengali</option>
            <option value="Hindi">Hindi</option>
          </select>
        </div>
      </div>

      <div class="field">
        <label for="mood">Your mood right now</label>
        <input
          type="text"
          id="mood"
          placeholder="e.g. Happy, Melancholic, Pumped up…"
          maxlength="80"
          autocomplete="off"
          spellcheck="false"
          required
          aria-required="true"
        />
        <!-- Quick-pick chips -->
        <div class="mood-chips" aria-label="Mood suggestions">
          <button type="button" class="chip" data-mood="Happy">Happy</button>
          <button type="button" class="chip" data-mood="Sad">Sad</button>
          <button type="button" class="chip" data-mood="Energetic">Energetic</button>
          <button type="button" class="chip" data-mood="Calm">Calm</button>
          <button type="button" class="chip" data-mood="Romantic">Romantic</button>
          <button type="button" class="chip" data-mood="Focused">Focused</button>
        </div>
      </div>

      <div id="form-error" role="alert" aria-live="polite"></div>

      <button type="submit" class="btn-primary" id="submitBtn" aria-label="Get 5 song recommendations">
        <span class="btn-label">✦ Get 5 Songs</span>
        <div class="spinner" aria-hidden="true"></div>
      </button>
    </form>

    <!-- Results -->
    <div id="results-section" aria-live="polite" aria-label="Song recommendations">
      <div class="divider"></div>
      <div class="results-header">
        <h2>Recommendations</h2>
        <span class="badge" id="results-meta"></span>
      </div>
      <div class="song-list" id="songList"></div>
    </div>

  </main>

  <footer class="footer">
    <p>Powered by Groq &amp; Llama 3 · Links open in a new tab</p>
  </footer>

  <script>
    /* ─────────────────────────────────────────────────────
       CONFIG — ONLY edit PROXY_URL if you use the worker.
       If you inject the key directly (dev-only), set
       GROQ_API_KEY to the actual key and leave PROXY_URL=''.
       ───────────────────────────────────────────────────── */
    const PROXY_URL    = '';          // e.g. 'https://moodwave.YOUR_SUBDOMAIN.workers.dev'
    const GROQ_API_KEY = 'GROQ_API_KEY_PLACEHOLDER'; // replaced by CI; blank = use proxy
    const GROQ_MODEL   = 'llama-3.3-70b-versatile';           // valid free Groq model

    /* ── DOM refs ──────────────────────────────────────── */
    const form          = document.getElementById('moodForm');
    const submitBtn     = document.getElementById('submitBtn');
    const formError     = document.getElementById('form-error');
    const resultsSection= document.getElementById('results-section');
    const songList      = document.getElementById('songList');
    const resultsMeta   = document.getElementById('results-meta');

    /* ── Mood chips ────────────────────────────────────── */
    document.querySelectorAll('.chip').forEach(chip => {
      chip.addEventListener('click', () => {
        const moodInput = document.getElementById('mood');
        moodInput.value = chip.dataset.mood;
        document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        formError.innerHTML = '';
      });
    });

    /* ── Form submission ───────────────────────────────── */
    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const language = document.getElementById('language').value.trim();
      const mood     = document.getElementById('mood').value.trim();

      // Client-side validation
      if (!language || !mood) {
        showFormError('Please choose a language and describe your mood.');
        return;
      }

      setLoading(true);
      formError.innerHTML = '';
      resultsSection.style.display = 'none';
      songList.innerHTML = '';

      try {
        const songs = await fetchSongs(language, mood);
        renderSongs(songs, language, mood);
      } catch (err) {
        showFormError(err.message || 'Something went wrong. Please try again.');
        console.error('[Moodwave]', err);
      } finally {
        setLoading(false);
      }
    });

    /* ── API call ──────────────────────────────────────── */
    async function fetchSongs(language, mood) {
      const prompt = `You are a music expert. Suggest exactly 5 ${language} songs for someone feeling "${mood}".

Return ONLY a JSON array with no extra text, no markdown, no code fences. Example format:
[
  { "title": "Song Name", "artist": "Artist Name", "spotify": "https://open.spotify.com/...", "youtube": "https://www.youtube.com/results?search_query=Song+Name+Artist" },
  ...
]

Rules:
- All 5 songs must be real, well-known ${language} tracks.
- Spotify link should be the real track URL if you know it; otherwise use "".
- YouTube link should always be a YouTube search URL: https://www.youtube.com/results?search_query=TITLE+ARTIST (URL-encode spaces as +).
- Return nothing except the JSON array.`;

      const endpoint = PROXY_URL
        ? PROXY_URL
        : 'https://api.groq.com/openai/v1/chat/completions';

      const headers = { 'Content-Type': 'application/json' }; 
      if (!PROXY_URL && GROQ_API_KEY) {
          headers['Authorization'] = `Bearer ${GROQ_API_KEY}`;
}

      const body = JSON.stringify({
        model: GROQ_MODEL,
        messages: [
          { role: 'system', content: 'You are a helpful music recommendation assistant. Always return valid JSON only.' },
          { role: 'user',   content: prompt }
        ],
        max_tokens: 700,
        temperature: 0.7
      });

      const response = await fetch(endpoint, { method: 'POST', headers, body });

      if (!response.ok) {
        let detail = '';
        try { const j = await response.json(); detail = j?.error?.message || ''; } catch {}
        throw new Error(`API error ${response.status}${detail ? ': ' + detail : ''}.`);
      }

      const data = await response.json();
      const raw  = (data?.choices?.[0]?.message?.content || '').trim();

      // Parse JSON robustly
      const jsonStr = raw.replace(/^```[a-z]*\n?/, '').replace(/```$/, '').trim();
      let songs;
      try {
        songs = JSON.parse(jsonStr);
        if (!Array.isArray(songs)) throw new Error();
      } catch {
        throw new Error('Could not parse the recommendations. Please try again.');
      }

      return songs.slice(0, 5);
    }

    /* ── Render ────────────────────────────────────────── */
    function renderSongs(songs, language, mood) {
      resultsMeta.textContent = `${language} · ${mood}`;

      songs.forEach((song, i) => {
        const card = document.createElement('div');
        card.className = 'song-card';
        card.style.animationDelay = `${i * 60}ms`;

        const title   = sanitize(song.title  || 'Unknown Title');
        const artist  = sanitize(song.artist || 'Unknown Artist');
        const spotify = isValidUrl(song.spotify) ? song.spotify : '';
        const ytBase  = 'https://www.youtube.com/results?search_query=';
        const youtube = isValidUrl(song.youtube)
          ? song.youtube
          : ytBase + encodeURIComponent(`${song.title} ${song.artist}`);

        card.innerHTML = `
          <div class="song-num">${i + 1}</div>
          <div class="song-info">
            <div class="song-name" title="${title}">${title}</div>
            <div class="song-artist">${artist}</div>
          </div>
          <div class="song-actions">
            ${spotify ? `<a href="${spotify}" target="_blank" rel="noopener noreferrer" class="btn-link btn-spotify">Spotify</a>` : ''}
            <a href="${youtube}" target="_blank" rel="noopener noreferrer" class="btn-link btn-yt">YouTube</a>
          </div>`;

        songList.appendChild(card);
      });

      resultsSection.style.display = 'block';
      resultsSection.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    /* ── Helpers ───────────────────────────────────────── */
    function setLoading(on) {
      submitBtn.disabled = on;
      submitBtn.classList.toggle('loading', on);
    }

    function showFormError(msg) {
      formError.innerHTML = `
        <div class="notice notice-error" role="alert">
          <span class="notice-icon">⚠</span>
          <span>${sanitize(msg)}</span>
        </div>`;
    }

    function sanitize(str) {
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    function isValidUrl(str) {
      try { return str && ['https:','http:'].includes(new URL(str).protocol); }
      catch { return false; }
    }
  </script>
</body>
</html>
